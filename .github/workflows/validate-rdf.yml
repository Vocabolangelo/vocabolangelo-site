name: Validate RDF

on:
  push:
    branches: [ '**' ]
  pull_request:
    branches: [ '**' ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4
      - name: Validate RDF
        uses: vemonet/jena-riot-action@v3.14
        with:
          input: public/schema/vocabolangelo.ttl
